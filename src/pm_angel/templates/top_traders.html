{% extends "base.html" %}
{% block content %}
<div class="top-traders">
    <h1>Top Traders</h1>

    <div class="filters">
        <select id="category" class="input" hx-get="/api/top-traders" hx-target="#traders-body"
                hx-include="#category, #time-period" hx-trigger="change" name="category">
            <option value="OVERALL">Tous</option>
            <option value="POLITICS">Politique</option>
            <option value="SPORTS">Sports</option>
            <option value="CRYPTO">Crypto</option>
            <option value="CULTURE">Culture</option>
            <option value="ECONOMICS">Economie</option>
            <option value="TECH">Tech</option>
        </select>
        <select id="time-period" class="input" hx-get="/api/top-traders" hx-target="#traders-body"
                hx-include="#category, #time-period" hx-trigger="change" name="time_period">
            <option value="MONTH">Mois</option>
            <option value="WEEK">Semaine</option>
            <option value="DAY">Jour</option>
            <option value="ALL">Tout</option>
        </select>
    </div>

    <table class="bets-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Nom</th>
                <th>Adresse</th>
                <th>PNL</th>
                <th>Volume</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="traders-body" hx-get="/api/top-traders" hx-trigger="load" hx-swap="innerHTML">
            <tr><td colspan="6" class="empty-state">Chargement...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}
